version: 2
updates:
  # Root package.json — karma/jasmine test tooling for the plugin collection
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"        # 30 min after dependency-submission workflow (03:00 UTC)
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      karma-testing:
        patterns:
          - "karma*"
          - "jasmine*"

  # Keep GitHub Actions workflow action versions updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "UTC"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
